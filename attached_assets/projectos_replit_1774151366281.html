async function callAI(system, user, maxTokens=600) {
  const key = localStorage.getItem('projectos_api_key');
  if (!key) { alert("Please add your Anthropic API key using the banner at the top."); return ""; }
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})
    });
    const d = await res.json();
    if (d.error) { console.error("AI error:", d.error); return "AI error — check your API key."; }
    return d.content?.[0]?.text || "";
  } catch(e) { console.error(e); return "Network error — check your key and try again."; }
}
const jsonAI = async(s,u,m=600)=>{
  const raw=await callAI(s,u,m);
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
};

function Av({id,size="sm"}) {

  const s=size==="lg"?28:size==="xl"?36:20, fs=size==="xl"?12:size==="lg"?10:7.5;
  return <div style={{width:s,height:s,borderRadius:"50%",background:m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:fs,fontWeight:800,color:"white",flexShrink:0}} title={m.name}>{m.ini}</div>;
}
function AvStack({ids=[],max=3}) {
  return <div style={{display:"flex"}}>{ids.slice(0,max).map((id,i)=><div key={id} style={{marginLeft:i?-5:0}}><Av id={id}/></div>)}</div>;
}
function Spinner({color}) {
  return <span style={{animation:"spin .7s linear infinite",display:"inline-block",color:color||T.accentBright}}>◌</span>;
}
function Shimmer() {
  return <div style={{height:2,borderRadius:2,overflow:"hidden",background:T.border,position:"relative",marginBottom:9}}>
    <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,transparent,${T.accentBright},${T.violet},transparent)`,animation:"shimmer 1.2s infinite linear"}}/>
  </div>;
}
function Badge({children,color}) {
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:9.5,fontWeight:700,padding:"2px 6px",borderRadius:5,background:T.bg,color:color||T.textSub}}>{children}</span>;
}
function Tag({label}) {
  return <span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:T.border,color:T.textSub}}>{label}</span>;
}
function ProgressBar({pct,color,height=5}) {
  return <div style={{height,background:T.border,borderRadius:height,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:color,borderRadius:height,transition:"width .5s ease"}}/>
  </div>;
}
function Ring({pct,color,size=60,stroke=6}) {
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=circ*(pct/100);
  return <svg width={size} height={size} style={{flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
      strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
      transform={`rotate(-90 ${size/2} ${size/2})`}/>
    <text x={size/2} y={size/2+4} textAnchor="middle" fontSize={11} fontWeight={800} fill={color} fontFamily="JetBrains Mono,monospace">{pct}%</text>
  </svg>;
}
function Card({children,style={}}) {
  return <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16,...style}}>{children}</div>;
}
function Modal({children,onClose,width=520,title}) {

      {task.tags?.slice(0,1).map(t=><Tag key={t} label={t}/>)}
      {task.subtasks?.length>0&&<span style={{fontSize:9.5,color:T.textSub,fontFamily:"JetBrains Mono,monospace"}}>{task.subtasks.filter(s=>s.done).length}/{task.subtasks.length}</span>}

}

function TaskDetail({task:init,allTasks,setTasks,sprints,onClose}) {
  const [t,setT]=useState(init);
  const [aiLoading,setAiLoading]=useState("");
  const save=useCallback(patch=>{
    const u={...t,...patch}; setT(u);
    setTasks(p=>p.some(x=>x.id===u.id)?p.map(x=>x.id===u.id?u:x):[u,...p]);
  },[t,setTasks]);
  const breakdown=async()=>{
    setAiLoading("bd");
    const subs=await AI.breakdown(t.title,t.type,t.priority);
    if(subs&&Array.isArray(subs))save({subtasks:[...t.subtasks,...subs.map(s=>({title:s,done:false}))]});
    setAiLoading("");
  };
  const pr=getPr(t.priority), pj=getPj(t.project), sp=sprints.find(s=>s.id===t.sprint);
  return <Modal onClose={onClose} width={640}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
      <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,color:T.textDim}}>{t.id}</span>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.textSub,cursor:"pointer",fontSize:18}}>×</button>
    </div>
    <input value={t.title} onChange={e=>save({title:e.target.value})}
      style={{background:"transparent",border:"none",outline:"none",fontSize:20,fontWeight:800,letterSpacing:"-.4px",color:T.text,width:"100%",marginBottom:12,fontFamily:"Geist,sans-serif"}}/>
    {/* Status */}
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
      {STATUSES.map(s=><button key={s.id} onClick={()=>save({status:s.id})}
        style={{padding:"4px 10px",borderRadius:18,fontSize:10.5,fontWeight:700,cursor:"pointer",border:`1px solid ${t.status===s.id?s.dot+"66":"transparent"}`,background:t.status===s.id?s.dot+"30":T.bg,color:t.status===s.id?s.dot:T.textSub,transition:"all .14s"}}>
        {s.label}
      </button>)}
    </div>
    {/* Meta */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
      {[
        {l:"Priority",v:<span style={{color:pr.color}}>{pr.icon} {pr.label}</span>},
        {l:"Points",v:<span style={{fontFamily:"JetBrains Mono,monospace"}}>{t.points} pts</span>},
        {l:"Due",v:<span style={{fontFamily:"JetBrains Mono,monospace",fontSize:11.5,color:isOD(t.due,t.status)?T.rose:T.textSub}}>{fmtDate(t.due)}</span>},
        {l:"Assigned",v:<AvStack ids={t.assignees||[]} max={5}/>},
        {l:"Sprint",v:<span style={{fontFamily:"JetBrains Mono,monospace",fontSize:11.5}}>{sp?.name||"Backlog"}</span>},
        {l:"Project",v:<span style={{color:pj?.color}}>{pj?.icon} {pj?.name}</span>},
      ].map(f=><div key={f.l} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 11px"}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:".7px",textTransform:"uppercase",color:T.textDim,marginBottom:3}}>{f.l}</div>
        <div style={{fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>{f.v}</div>
      </div>)}
    </div>
    {/* Subtasks */}
    {t.subtasks.length>0&&<div style={{background:T.bg,borderRadius:8,padding:"4px 8px",marginBottom:10}}>
      {t.subtasks.map((s,i)=><div key={i} onClick={()=>save({subtasks:t.subtasks.map((x,j)=>j===i?{...x,done:!x.done}:x)})}
        style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<t.subtasks.length-1?`1px solid ${T.border}`:"none",cursor:"pointer",fontSize:12.5}}>
        <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${s.done?T.green:T.borderHi}`,background:s.done?T.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"white",flexShrink:0}}>{s.done&&"✓"}</div>
        <span style={{textDecoration:s.done?"line-through":"none",opacity:s.done?.45:1}}>{s.title}</span>
      </div>)}
    </div>}
    <button onClick={breakdown} disabled={!!aiLoading}
      style={{width:"100%",padding:"8px 0",marginBottom:12,borderRadius:8,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontWeight:800,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
      {aiLoading==="bd"?<Spinner/>:"✦"} AI: Auto-generate subtasks
    </button>
    <Txta value={t.notes} onChange={e=>save({notes:e.target.value})} placeholder="Notes, context, links…" style={{marginBottom:12}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      <Field label="Priority"><Sel value={t.priority} onChange={e=>save({priority:e.target.value})}>{PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.icon} {p.label}</option>)}</Sel></Field>
      <Field label="Sprint"><Sel value={t.sprint||""} onChange={e=>save({sprint:e.target.value||null})}><option value="">Backlog</option>{sprints.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel></Field>
      <Field label="Project"><Sel value={t.project} onChange={e=>save({project:e.target.value})}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.icon} {p.name}</option>)}</Sel></Field>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:18}}>
      <button onClick={onClose} style={{padding:"7px 15px",borderRadius:7,border:`1px solid ${T.border}`,background:T.bg,color:T.textSub,fontSize:12,fontWeight:700,cursor:"pointer"}}>Close</button>
    </div>
  </Modal>;
}

// ── DASHBOARD ─────────────────────────────────────────────
function DashboardPage({tasks,entries,sprints,goals,docs,setPage}) {
  const [briefing,setBriefing]=useState(""),  [loading,setLoading]=useState(false);
  const overdue=tasks.filter(t=>isOD(t.due,t.status)), critical=tasks.filter(t=>t.priority==="critical"&&t.status!=="done");
  const todayH=entries.filter(e=>new Date(e.date).toDateString()===new Date().toDateString()).reduce((a,e)=>a+e.hours,0);
  const weekAmt=entries.filter(e=>e.date>now()-7*MS).reduce((a,e)=>a+e.amount,0);
  const getBriefing=async()=>{
    setLoading(true);
    const ctx=`Tasks: ${tasks.filter(t=>t.status!=="done").slice(0,8).map(t=>`[${t.priority}/${t.status}] ${t.title}`).join("; ")}\nOverdue: ${overdue.length}\nCritical: ${critical.length}\nHours today: ${fmtH(todayH)}\nWeek revenue: ${fmt$(weekAmt)}`;
    setBriefing(await AI.dailyBriefing(ctx)); setLoading(false);
  };
  useEffect(()=>{getBriefing();},[]);
  const h=new Date().getHours(), g=h<12?"morning":h<17?"afternoon":"evening";
  return <div style={{padding:20}}>
    {/* Welcome */}
    <div style={{background:`linear-gradient(135deg,${T.accentDim},${T.surfaceUp})`,border:`1px solid ${T.accent}25`,borderRadius:14,padding:"20px 24px",marginBottom:20,display:"flex",alignItems:"flex-start",gap:20}}>
      <div style={{fontSize:36,animation:"float 3s ease-in-out infinite",flexShrink:0}}>✦</div>
      <div style={{flex:1}}>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:"-.5px",marginBottom:5}}>Good {g} — here's your day</div>
        <div style={{fontSize:13,color:T.textSub}}>{overdue.length} overdue · {critical.length} critical · {fmtH(todayH)} logged today · {fmt$(weekAmt)} this week</div>
        {loading&&<Shimmer/>}
        {briefing&&<div style={{background:T.surfaceHi,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginTop:12,fontSize:12.5,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{briefing}</div>}
      </div>
      <button onClick={getBriefing} disabled={loading} style={{padding:"7px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontWeight:800,fontSize:12,cursor:"pointer",flexShrink:0}}>{loading?<Spinner/>:"✦"} Refresh</button>
    </div>
    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      {[
        {val:tasks.filter(t=>t.status==="inprogress").length,lbl:"In Progress",sub:`${tasks.filter(t=>t.status==="done").length} done`,color:T.accent},
        {val:overdue.length,lbl:"Overdue",sub:`${critical.length} critical`,color:overdue.length>0?T.rose:T.green},
        {val:fmtH(todayH),lbl:"Hours Today",sub:fmt$(todayH*100),color:T.sky},
        {val:goals.filter(g=>g.status==="on_track").length+"/"+goals.length,lbl:"Goals On Track",sub:"OKR overview",color:T.emerald},
      ].map(s=><Card key={s.lbl}>
        <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:24,fontWeight:800,letterSpacing:"-.5px",color:s.color,marginBottom:3}}>{s.val}</div>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub}}>{s.lbl}</div>
        <div style={{fontSize:10,color:T.textDim,marginTop:2,fontFamily:"JetBrains Mono,monospace"}}>{s.sub}</div>
      </Card>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
      <Card>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub,marginBottom:12}}>🔥 Needs Attention</div>
        {[...overdue.slice(0,3),...critical.filter(t=>!isOD(t.due,t.status)).slice(0,2)].map(t=>(
          <div key={t.id} onClick={()=>setPage("tasks")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}20`,cursor:"pointer",fontSize:12.5}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:isOD(t.due,t.status)?T.rose:T.amber,flexShrink:0}}/>
            <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
            <span style={{fontSize:9.5,color:isOD(t.due,t.status)?T.rose:T.textSub,fontFamily:"JetBrains Mono,monospace",flexShrink:0}}>{fmtDate(t.due)}</span>
          </div>
        ))}
        {!overdue.length&&!critical.length&&<div style={{textAlign:"center",padding:"20px 0",color:T.textDim}}>✓ All clear!</div>}
      </Card>
      <Card>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub,marginBottom:12}}>💰 Project Budgets</div>
        {PROJECTS.map(p=>{
          const spent=entries.filter(e=>e.project===p.id).reduce((a,e)=>a+e.amount,0);
          const pct=Math.min(100,Math.round(spent/p.budget*100));
          const col=pct<60?T.green:pct<80?T.amber:T.rose;
          return <div key={p.id} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:600,color:p.color}}>{p.icon} {p.name}</span>
              <span style={{fontSize:11,fontFamily:"JetBrains Mono,monospace",color:col}}>{pct}%</span>
            </div>
            <ProgressBar pct={pct} color={col}/>
            <div style={{fontSize:10,color:T.textSub,fontFamily:"JetBrains Mono,monospace",marginTop:2}}>{fmt$(spent)} / {fmt$(p.budget)}</div>
          </div>;
        })}
      </Card>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
      <Card>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub,marginBottom:12}}>📄 Recent Docs</div>
        {docs.slice(0,5).map(d=><div key={d.id} onClick={()=>setPage("docs")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}20`,cursor:"pointer",fontSize:12.5}}>
          <span>{d.icon}</span><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</span>
          <span style={{fontSize:9.5,color:T.textSub,flexShrink:0}}>{fmtDate(d.updated)}</span>
        </div>)}
      </Card>
      <Card>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub,marginBottom:12}}>⬡ Active Sprints</div>
        {sprints.filter(s=>s.status==="active").map(s=>{
          const st=tasks.filter(t=>t.sprint===s.id), done=st.filter(t=>t.status==="done");
          const pct=st.length?Math.round(done.length/st.length*100):0;
          const p=getPj(s.project);
          return <div key={s.id} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:600,color:p?.color}}>{p?.icon} {s.name}</span>
              <span style={{fontSize:10,color:T.textSub,fontFamily:"JetBrains Mono,monospace"}}>{pct}%</span>
            </div>
            <ProgressBar pct={pct} color={p?.color||T.accent}/>
          </div>;
        })}
      </Card>
      <Card>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub,marginBottom:12}}>🎯 Goals</div>
        {goals.map(g=>{
          const hc=g.status==="on_track"?T.green:g.status==="at_risk"?T.amber:T.rose;
          return <div key={g.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}20`,fontSize:12.5}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:hc,flexShrink:0}}/>
            <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.title}</span>
            <span style={{fontFamily:"JetBrains Mono,monospace",fontSize:10.5,color:hc,fontWeight:700}}>{g.progress}%</span>
          </div>;
        })}
      </Card>
    </div>
  </div>;
}

// ── TASKS ─────────────────────────────────────────────────
function TasksPage({tasks,setTasks,sprints,activeProject}) {
  const [viewMode,setViewMode]=useState("kanban");
  const [nlInput,setNlInput]=useState(""), [nlLoading,setNlLoading]=useState(false), [nlMsg,setNlMsg]=useState("");
  const [selected,setSelected]=useState(null);
  const [showNew,setShowNew]=useState(false), [newStatus,setNewStatus]=useState("todo");
  const [collapsed,setCollapsed]=useState({});
  const projTasks=activeProject?tasks.filter(t=>t.project===activeProject):tasks;

  const createNL=async()=>{
    if(!nlInput.trim())return; setNlLoading(true);
    const parsed=await AI.parseTask(nlInput,"");
    if(parsed){
      const task={...parsed,id:`t-${Date.now()}`,project:activeProject||"p1",due:parsed.dueOffset!=null?fwd(parsed.dueOffset):fwd(7),subtasks:[],notes:"",created:now()};
      delete task.dueOffset;
      setTasks(p=>[task,...p]);
      setNlMsg(`✦ "${task.title?.slice(0,40)}" created · ${task.priority}`);
      setNlInput("");
    } else setNlMsg("Could not parse — try rephrasing");
    setNlLoading(false); setTimeout(()=>setNlMsg(""),4000);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 18px",borderBottom:`1px solid ${T.border}`,flexShrink:0,flexWrap:"wrap"}}>
      <div style={{display:"flex",gap:2,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:3}}>
        {["kanban","list"].map(v=><button key={v} onClick={()=>setViewMode(v)}
          style={{padding:"4px 12px",borderRadius:6,border:"none",background:viewMode===v?T.accentDim:"transparent",color:viewMode===v?T.accentBright:T.textSub,fontSize:11.5,fontWeight:600,cursor:"pointer"}}>
          {v==="kanban"?"▦ Board":"≡ List"}
        </button>)}
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:T.surfaceUp,border:`1px solid ${T.borderHi}`,borderRadius:9,padding:"8px 12px"}}>
        <span style={{fontSize:14,color:T.accentBright}}>✦</span>
        <input value={nlInput} onChange={e=>setNlInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createNL()} disabled={nlLoading}
          placeholder='AI input — "fix auth bug assign sam critical due friday"'
          style={{flex:1,background:"none",border:"none",outline:"none",color:T.text,fontSize:12.5,fontFamily:"Geist,sans-serif"}}/>
        {nlLoading&&<Spinner/>}
      </div>
      <button onClick={()=>{setNewStatus("todo");setShowNew(true);}}
        style={{padding:"6px 13px",borderRadius:8,border:"none",background:T.accent,color:"white",fontWeight:700,fontSize:11.5,cursor:"pointer"}}>+ New</button>
    </div>
    {nlMsg&&<div style={{padding:"4px 18px",fontSize:10.5,color:T.accentBright,fontWeight:600}}>{nlMsg}</div>}

    <div style={{flex:1,overflowY:"auto",overflowX:viewMode==="kanban"?"auto":"hidden"}}>
      {viewMode==="kanban"&&<div style={{display:"flex",gap:10,padding:"14px 18px 24px",alignItems:"flex-start"}}>
        {STATUSES.map(status=>{
          const cols=projTasks.filter(t=>t.status===status.id);
          return <div key={status.id} style={{minWidth:224,width:224,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 2px 9px",fontSize:10.5,fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",color:status.color}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:status.dot}}/>{status.label}
              <span style={{marginLeft:"auto",fontFamily:"JetBrains Mono,monospace",fontSize:10,background:T.border,color:T.textSub,padding:"1px 6px",borderRadius:8}}>{cols.length}</span>
            </div>
            {cols.map(task=><TaskCard key={task.id} task={task} onClick={()=>setSelected(task)}/>)}
            <div onClick={()=>{setNewStatus(status.id);setShowNew(true);}}
              style={{border:`1.5px dashed ${T.border}`,borderRadius:8,padding:7,fontSize:11,color:T.textDim,textAlign:"center",cursor:"pointer"}}>+ Add task</div>
          </div>;
        })}
      </div>}

      {viewMode==="list"&&<div style={{padding:"12px 18px 24px"}}>
        {STATUSES.map(status=>{
          const group=projTasks.filter(t=>t.status===status.id), col=collapsed[status.id];
          return <div key={status.id} style={{marginBottom:14}}>
            <div onClick={()=>setCollapsed(p=>({...p,[status.id]:!p[status.id]}))}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 4px",fontSize:10.5,fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",color:status.color,cursor:"pointer",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:9}}>{col?"▶":"▼"}</span>
              <div style={{width:6,height:6,borderRadius:"50%",background:status.dot}}/>{status.label}
              <span style={{fontSize:10,background:T.border,color:T.textSub,padding:"0 5px",borderRadius:6,fontFamily:"JetBrains Mono,monospace"}}>{group.length}</span>
            </div>
            {!col&&group.map(task=>{
              const pr=getPr(task.priority);
              return <div key={task.id} onClick={()=>setSelected(task)}
                style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 70px 50px",gap:8,padding:"8px 8px",borderRadius:7,cursor:"pointer",alignItems:"center",borderBottom:`1px solid ${T.border}20`,fontSize:12.5}}>
                <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:task.status==="done"?.5:1,textDecoration:task.status==="done"?"line-through":"none"}}>{task.title}</div>
                <div><AvStack ids={task.assignees||[]}/></div>
                <div><Badge color={pr.color}>{pr.icon} {pr.label}</Badge></div>
                <div style={{fontSize:11,fontFamily:"JetBrains Mono,monospace",color:isOD(task.due,task.status)?T.rose:T.textSub}}>{fmtDate(task.due)}</div>
                <div style={{fontSize:11,fontFamily:"JetBrains Mono,monospace",color:T.textSub}}>{task.points}</div>
              </div>;
            })}
          </div>;
        })}
      </div>}
    </div>

    {selected&&<TaskDetail task={selected} allTasks={tasks} setTasks={setTasks} sprints={sprints} onClose={()=>setSelected(null)}/>}
    {showNew&&<NewTaskModal defaultStatus={newStatus} activeProject={activeProject} sprints={sprints} onClose={()=>setShowNew(false)}
      onAdd={task=>{setTasks(p=>[task,...p]);setShowNew(false);}}/>}
  </div>;
}

function NewTaskModal({defaultStatus,activeProject,sprints,onClose,onAdd}) {
  const [f,setF]=useState({title:"",type:"task",status:defaultStatus||"todo",priority:"medium",assignees:[],points:3,sprint:"",due:"",tags:[],notes:""});
  const [aiMsg,setAiMsg]=useState(""); const s=v=>setF(p=>({...p,...v}));
  const autoPri=async title=>{
    if(title.length<8)return;
    const p=(await AI.suggestPriority(title))?.trim().toLowerCase();
    if(["critical","high","medium","low"].includes(p)){s({priority:p});setAiMsg(`AI: ${p} priority`);setTimeout(()=>setAiMsg(""),2500);}
  };
  const submit=()=>{
    if(!f.title.trim())return;
    onAdd({...f,id:`t-${Date.now()}`,project:activeProject||"p1",due:f.due?new Date(f.due).getTime():fwd(7),subtasks:[],created:now()});
  };
  return <Modal title="◻ New Task" onClose={onClose}>
    <Field label="Title"><Inp autoFocus value={f.title} placeholder="What needs to be done?"
      onChange={e=>{s({title:e.target.value});autoPri(e.target.value);}} onKeyDown={e=>e.key==="Enter"&&submit()}/></Field>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      <Field label="Type"><Sel value={f.type} onChange={e=>s({type:e.target.value})}>{["task","bug","feature","story","epic"].map(t=><option key={t} value={t}>{t}</option>)}</Sel></Field>
      <Field label={`Priority${aiMsg?" ✦":""}`}><Sel value={f.priority} onChange={e=>s({priority:e.target.value})}>{PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.icon} {p.label}</option>)}</Sel></Field>
      <Field label="Status"><Sel value={f.status} onChange={e=>s({status:e.target.value})}>{STATUSES.map(x=><option key={x.id} value={x.id}>{x.label}</option>)}</Sel></Field>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      <Field label="Sprint"><Sel value={f.sprint} onChange={e=>s({sprint:e.target.value})}><option value="">Backlog</option>{sprints.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}</Sel></Field>
      <Field label="Points"><Sel value={f.points} onChange={e=>s({points:+e.target.value})}>{[1,2,3,5,8,13,21].map(n=><option key={n} value={n}>{n}</option>)}</Sel></Field>
      <Field label="Due Date"><Inp type="date" value={f.due} onChange={e=>s({due:e.target.value})}/></Field>
    </div>
    {aiMsg&&<div style={{fontSize:10.5,color:T.accentBright,marginBottom:8}}>✦ {aiMsg}</div>}
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}}>
      <button onClick={onClose} style={{padding:"7px 15px",borderRadius:7,border:`1px solid ${T.border}`,background:T.bg,color:T.textSub,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancel</button>
      <button onClick={submit} style={{padding:"7px 15px",borderRadius:7,border:"none",background:T.accent,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>Create Task</button>
    </div>
  </Modal>;
}

// ── TIME TRACKING ─────────────────────────────────────────
function TimePage({entries,setEntries}) {
  const [running,setRunning]=useState(false), [elapsed,setElapsed]=useState(0);
  const [proj,setProj]=useState("p1"), [desc,setDesc]=useState(""), [memberId,setMemberId]=useState(1);
  const intRef=useRef();
  useEffect(()=>{ if(running){intRef.current=setInterval(()=>setElapsed(e=>e+1),1000);}else clearInterval(intRef.current); return()=>clearInterval(intRef.current); },[running]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const toggle=()=>{
    if(!running){setElapsed(0);setRunning(true);}
    else{
      const m=getMb(memberId), hrs=Math.max(.25,Math.round(elapsed/3600*4)/4);
      setEntries(p=>[{id:`e${Date.now()}`,member:memberId,project:proj,desc:desc||"Timer entry",hours:hrs,date:now(),billable:true,rate:m.rate,amount:hrs*m.rate},...p]);
      setRunning(false);setElapsed(0);setDesc("");
    }
  };
  const todayH=entries.filter(e=>new Date(e.date).toDateString()===new Date().toDateString()).reduce((a,e)=>a+e.hours,0);
  const weekAmt=entries.filter(e=>e.date>now()-7*MS).reduce((a,e)=>a+e.amount,0);
  // group by day
  const grouped=useMemo(()=>{
    const g={};
    entries.slice(0,60).forEach(e=>{const k=new Date(e.date).toDateString();if(!g[k])g[k]={date:e.date,entries:[]};g[k].entries.push(e);});
    return Object.values(g).sort((a,b)=>b.date-a.date);
  },[entries]);
  return <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    {/* Timer */}
    <div style={{margin:"12px 18px 0",background:T.surface,border:`1px solid ${running?T.green+"50":T.borderHi}`,borderRadius:11,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
      <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:24,fontWeight:800,letterSpacing:"-.5px",minWidth:85,color:running?T.green:T.text}}>{fmt(elapsed)}</div>
      <div style={{display:"flex",gap:7,flex:1,flexWrap:"wrap"}}>
        <Sel value={memberId} onChange={e=>setMemberId(+e.target.value)} style={{flex:1,minWidth:100,padding:"6px 9px",fontSize:12}}>{MEMBERS.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</Sel>
        <Sel value={proj} onChange={e=>setProj(e.target.value)} style={{flex:1,minWidth:100,padding:"6px 9px",fontSize:12}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Sel>
        <input value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!running&&toggle()} placeholder="What are you working on?"
          style={{...inputSt,flex:2,minWidth:160,padding:"6px 9px",fontSize:12}}/>
      </div>
      <button onClick={toggle} style={{width:38,height:38,borderRadius:"50%",border:"none",background:running?T.rose:T.green,color:"white",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{running?"■":"▶"}</button>
    </div>
    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,padding:"12px 18px",flexShrink:0}}>
      {[
        {val:fmtH(todayH),lbl:"Today",color:T.accent},
        {val:fmt$(weekAmt),lbl:"This Week",color:T.sky},
        {val:fmtH(entries.filter(e=>e.billable).reduce((a,e)=>a+e.hours,0)),lbl:"Billable",color:T.green},
        {val:`${entries.length?Math.round(entries.filter(e=>e.billable).length/entries.length*100):0}%`,lbl:"Billable %",color:T.emerald},
      ].map(s=><Card key={s.lbl} style={{padding:"12px 14px"}}>
        <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:18,fontWeight:800,color:s.color,marginBottom:2}}>{s.val}</div>
        <div style={{fontSize:9.5,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textSub}}>{s.lbl}</div>
      </Card>)}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 18px 24px"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Date","Member","Project","Description","Hours","Amount","Bill."].map(h=><th key={h} style={{textAlign:"left",padding:"7px 10px",fontSize:9.5,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textDim,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,background:T.surface}}>{h}</th>)}</tr></thead>
        <tbody>
          {grouped.map(group=>[
            <tr key={group.date}><td colSpan={7}><div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px 4px",fontSize:9.5,fontWeight:700,letterSpacing:".8px",textTransform:"uppercase",color:T.textDim,borderBottom:`1px solid ${T.border}`,background:T.bg}}>
              {fmtDate(group.date)} · {fmtH(group.entries.reduce((a,e)=>a+e.hours,0))} · {fmt$(group.entries.reduce((a,e)=>a+e.amount,0))}
              {new Date(group.date).toDateString()===new Date().toDateString()&&<span style={{background:T.accentDim,color:T.accentBright,fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:10}}>TODAY</span>}
            </div></td></tr>,
            ...group.entries.map(e=>{const m=getMb(e.member),p=getPj(e.project);return <tr key={e.id} style={{borderBottom:`1px solid ${T.border}20`}}>
              <td style={{padding:"9px 10px",fontSize:11,fontFamily:"JetBrains Mono,monospace",color:T.textSub}}>{fmtDate(e.date)}</td>
              <td style={{padding:"9px 10px"}}><div style={{display:"flex",alignItems:"center",gap:5}}><Av id={e.member}/><span style={{fontSize:11.5}}>{m?.name.split(" ")[0]}</span></div></td>
              <td style={{padding:"9px 10px"}}><span style={{fontSize:11,fontWeight:600,color:p?.color}}>{p?.icon} {p?.name}</span></td>
              <td style={{padding:"9px 10px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc}</td>
              <td style={{padding:"9px 10px",fontFamily:"JetBrains Mono,monospace",fontWeight:600}}>{fmtH(e.hours)}</td>
              <td style={{padding:"9px 10px",fontFamily:"JetBrains Mono,monospace",fontWeight:700}}>{fmt$(e.amount)}</td>
              <td style={{padding:"9px 10px"}}><div style={{width:7,height:7,borderRadius:"50%",background:e.billable?T.green:T.textDim}}/></td>
            </tr>;})
          ])}
        </tbody>
      </table>
    </div>
  </div>;
}

    setStandups(MEMBERS.map((m,i)=>({member:m.id,text:results[i],ts:now()}))); setLoading({});

}

// ── AI CHAT ───────────────────────────────────────────────
function AiDrawer({tasks,entries,announcements,goals,onClose}) {
  const [msgs,setMsgs]=useState([{role:"system",text:"✦ Hi! I'm your ProjectOS AI. Ask me about tasks, projects, time, goals, or anything."}]);
  const [input,setInput]=useState(""), [loading,setLoading]=useState(false);
  const ref=useRef();
  const suggs=["What's overdue?","Summarize this week","Which goals are at risk?","Draft a standup for Alex","How's the API Gateway doing?"];
  const send=async(msg)=>{
    if(!msg.trim())return;
    setMsgs(p=>[...p,{role:"user",text:msg}]); setInput(""); setLoading(true);
    const ctx=[
      `Tasks: ${tasks.filter(t=>t.status!=="done").slice(0,8).map(t=>`[${t.priority}/${t.status}] ${t.title}`).join("; ")}`,
      `Overdue: ${tasks.filter(t=>isOD(t.due,t.status)).length}`,
      `Goals: ${goals.map(g=>`${g.title}(${g.status},${g.progress}%)`).join(", ")}`,
      `Hours this week: ${fmtH(entries.filter(e=>e.date>now()-7*MS).reduce((a,e)=>a+e.hours,0))}`,
    ].join("\n");
    const reply=await AI.chat(msg,ctx);
    setMsgs(p=>[...p,{role:"ai",text:reply||"I couldn't process that — try again."}]); setLoading(false);
    setTimeout(()=>ref.current?.scrollTo({top:99999,behavior:"smooth"}),100);
  };
  return <div style={{position:"fixed",right:0,top:0,bottom:0,width:380,background:T.surface,borderLeft:`1px solid ${T.borderHi}`,display:"flex",flexDirection:"column",zIndex:100,boxShadow:"-8px 0 40px rgba(0,0,0,.5)",animation:"slideR .2s ease"}}>
    <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8,background:`linear-gradient(135deg,${T.accentDim},${T.surfaceUp})`}}>
      <span style={{fontSize:14,fontWeight:800,background:`linear-gradient(90deg,${T.accentBright},${T.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>✦ ProjectOS AI</span>
      <div style={{width:6,height:6,borderRadius:"50%",background:T.green,animation:"pulse 2s infinite",marginLeft:4}}/>
      <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",color:T.textSub,cursor:"pointer",fontSize:18}}>×</button>
    </div>
    <div ref={ref} style={{flex:1,overflowY:"auto",padding:14}}>
      {msgs.map((m,i)=><div key={i} style={{padding:"9px 11px",borderRadius:9,fontSize:12.5,lineHeight:1.7,marginBottom:8,...(m.role==="user"?{background:T.accentDim,border:`1px solid ${T.accent}20`,textAlign:"right"}:m.role==="ai"?{background:T.surfaceUp,border:`1px solid ${T.border}`}:{color:T.textSub,fontSize:11,textAlign:"center"})}}>{m.text}</div>)}
      {loading&&<Shimmer/>}
      {msgs.length<=1&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>{suggs.map(s=><button key={s} onClick={()=>send(s)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${T.border}`,background:T.surfaceUp,color:T.textSub,fontSize:11,cursor:"pointer"}}>{s}</button>)}</div>}
    </div>
    <div style={{display:"flex",gap:7,padding:"12px 14px",borderTop:`1px solid ${T.border}`}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="Ask anything…"
        style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none",fontFamily:"Geist,sans-serif"}}/>
      <button onClick={()=>send(input)} style={{padding:"8px 14px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontWeight:800,cursor:"pointer",fontSize:12}}>{loading?"…":"↑"}</button>
    </div>
  </div>;
}

  // Simple doc viewer (markdown-style)
  const DocViewer=()=>{

    const [content,setContent]=useState(activeDoc?.content||"");

      setAiLoading(true);

        }).join("\n\n");
        const updated={...activeDoc,content:text,updated:now()};

      return text.split("\n").map((line,i)=>{

      {icon:"◻",label:"Docs & Wiki",   page:"docs"},

          <span style={{fontSize:11,color:T.textSub}}>🔍</span><span style={{fontSize:11.5,color:T.textDim,flex:1}}>Search…</span><span style={{fontSize:9,fontFamily:"JetBrains Mono,monospace",background:T.surfaceUp,border:`1px solid ${T.border}`,borderRadius:3,padding:"1px 5px",color:T.textSub}}>⌘K</span>
        </div>

          {NAV_SECTIONS.map(section=><div key={section.label} style={{padding:"10px 6px 3px"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.4px",textTransform:"uppercase",color:T.textDim,padding:"0 8px",marginBottom:3}}>{section.label}</div>

              return <div key={item.label} onClick={()=>navigate(item.page,item.project||null)}
                style={{display:"flex",alignItems:"center",gap:7,padding:"7px 8px",borderRadius:7,fontSize:12.5,color:isAct?T.accentBright:T.textSub,fontWeight:500,cursor:"pointer",background:isAct?T.accentDim:"transparent",transition:"all .12s"}}>
                {item.color?<div style={{width:8,height:8,borderRadius:"50%",background:item.color,flexShrink:0}}/>:<span style={{fontSize:12,width:18,textAlign:"center"}}>{item.icon}</span>}
                <span>{item.label}</span>
                {item.badge>0&&<span style={{marginLeft:"auto",fontSize:10,background:item.alert?T.roseDim:T.border,color:item.alert?T.rose:T.textSub,padding:"0 5px",borderRadius:6,fontFamily:"JetBrains Mono,monospace"}}>{item.badge}</span>}
              </div>;
            })}
          </div>)}
          <div style={{padding:"10px 6px 3px"}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.4px",textTransform:"uppercase",color:T.textDim,padding:"0 8px",marginBottom:3}}>Team</div>
            {MEMBERS.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 8px",borderRadius:7,fontSize:12.5,color:T.textSub}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6.5,fontWeight:800,color:"white"}}>{m.ini}</div>
              <span>{m.name.split(" ")[0]}</span>
              <span style={{marginLeft:"auto",fontSize:10,background:T.border,color:T.textSub,padding:"0 5px",borderRadius:6,fontFamily:"JetBrains Mono,monospace"}}>{tasks.filter(t=>t.assignees?.includes(m.id)&&t.status!=="done").length}</span>
            </div>)}
          </div>
        </div>
        <div style={{padding:"10px 14px",borderTop:`1px solid ${T.border}`,flexShrink:0}}>
          <div onClick={()=>setShowAI(p=>!p)} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 10px",background:T.accentDim,border:`1px solid ${T.accent}30`,borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:T.accentBright,marginBottom:8}}>
            <span>✦</span><span style={{flex:1}}>Ask AI anything</span><span style={{fontSize:9,fontFamily:"JetBrains Mono,monospace",background:T.surfaceUp,border:`1px solid ${T.border}`,borderRadius:3,padding:"1px 5px",color:T.textSub}}>⌘I</span>
          </div>
          <div style={{fontSize:9.5,color:T.textDim,display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:T.green,animation:"pulse 2s infinite"}}/>
            ProjectOS · No install · No build
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <div style={{height:50,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",padding:"0 20px",gap:10,background:T.surface,flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:800,letterSpacing:"-.4px",display:"flex",alignItems:"center",gap:8,flex:1}}>
            {PAGE_ICONS[page]||"◻"} {PAGE_TITLES[page]||page}
            {getPj(activeProject)&&page==="tasks"&&<><span style={{fontSize:11,color:T.textDim}}>›</span><span style={{fontSize:11,color:getPj(activeProject)?.color,fontWeight:600}}>{getPj(activeProject)?.icon} {getPj(activeProject)?.name}</span><button onClick={()=>setActiveProject(null)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDim,fontSize:10}}>✕</button></>}
            <div style={{width:6,height:6,borderRadius:"50%",background:T.green,animation:"pulse 2s infinite",marginLeft:4}}/>
          </div>
          {overdue.length>0&&<span style={{fontSize:11,color:T.rose,fontFamily:"JetBrains Mono,monospace",fontWeight:700}}>⚠ {overdue.length} overdue</span>}
          <button onClick={()=>setShowAI(p=>!p)} style={{padding:"5px 12px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontWeight:800,fontSize:12,cursor:"pointer"}}>✦ AI</button>
        </div>

        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <div style={{flex:1,overflowY:"auto"}}>
              {page==="dashboard"&&<DashboardPage tasks={tasks} entries={entries} sprints={sprints} goals={goals} docs={docs} setPage={setPage}/>}
              {page==="tasks"&&<TasksPage tasks={tasks} setTasks={setTasks} sprints={sprints} activeProject={activeProject}/>}
              {page==="docs"&&!activeDoc&&<div style={{display:"flex",flex:1,overflow:"hidden"}}>
                <div style={{width:280,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",background:T.surface}}>
                  <div style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <span style={{fontSize:13.5,fontWeight:800,flex:1}}>Docs</span>
                    <button onClick={()=>{const d={id:`d-${Date.now()}`,title:"Untitled",icon:"◻",project:"p1",author:1,updated:now(),tags:[],pinned:false,versions:[{ts:now(),author:1,label:"Created"}],content:"# Untitled\n\nStart writing…"};setDocs(p=>[d,...p]);setActiveDoc(d);}} style={{padding:"5px 10px",borderRadius:7,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ New</button>
                  </div>
                  <div style={{flex:1,overflowY:"auto",padding:7}}>
                    {docs.map(d=><div key={d.id} onClick={()=>setActiveDoc(d)}
                      style={{display:"flex",alignItems:"flex-start",gap:9,padding:9,borderRadius:9,cursor:"pointer",border:`1px solid transparent`,marginBottom:3,transition:"all .12s"}}
                      onMouseEnter={e=>e.currentTarget.style.background=T.surfaceUp}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{fontSize:18}}>{d.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12.5,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{d.title}</div>
                        <div style={{fontSize:10,color:T.textSub,display:"flex",gap:4}}><span>{fmtDate(d.updated)}</span>{d.pinned&&<span>📌</span>}</div>
                      </div>
                    </div>)}
                  </div>
                </div>
                <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
                  <div style={{textAlign:"center",maxWidth:480}}>
                    <div style={{fontSize:42,marginBottom:14}}>◻</div>
                    <div style={{fontSize:22,fontWeight:800,letterSpacing:"-.5px",marginBottom:10}}>Docs & Wiki</div>
                    <div style={{fontSize:14,color:T.textSub,marginBottom:24,lineHeight:1.7}}>Block-based documents, AI writing, version history, and team knowledge base.</div>
                    <button onClick={()=>{const d={id:`d-${Date.now()}`,title:"Untitled",icon:"◻",project:"p1",author:1,updated:now(),tags:[],pinned:false,versions:[{ts:now(),author:1,label:"Created"}],content:"# Untitled\n\nStart writing here…"};setDocs(p=>[d,...p]);setActiveDoc(d);}}
                      style={{padding:"10px 22px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${T.accent},${T.violet})`,color:"white",fontWeight:800,fontSize:13,cursor:"pointer"}}>✦ Create new doc</button>
                  </div>
                </div>
              </div>}
              {page==="docs"&&activeDoc&&<DocViewer/>}
              {page==="time"&&<TimePage entries={entries} setEntries={setEntries}/>}
              {page==="goals"&&<GoalsPage goals={goals}/>}
              {page==="announcements"&&<AnnouncementsPage announcements={announcements} setAnnouncements={setAnnouncements}/>}
              {page==="standups"&&<StandupsPage tasks={tasks}/>}
              {page==="portfolio"&&<PortfolioPage tasks={tasks} entries={entries}/>}
            </div>
          </div>
          {showAI&&<AiDrawer tasks={tasks} entries={entries} announcements={announcements} goals={goals} onClose={()=>setShowAI(false)}/>}
        </div>
      </div>
    </div>

    {showCmd&&<CmdPalette/>}
    {toast&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:999,background:T.surfaceHi,border:`1px solid ${T.borderHi}`,borderRadius:10,padding:"11px 18px",fontSize:12.5,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,.6)",animation:"slideUp .2s ease",display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>{toast.icon} {toast.msg}</div>}
  </>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
