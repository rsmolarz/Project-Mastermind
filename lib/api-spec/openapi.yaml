openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ProjectOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: members
    description: Team members
  - name: tasks
    description: Task management
  - name: sprints
    description: Sprint management
  - name: timeEntries
    description: Time tracking
  - name: goals
    description: Goals and OKRs
  - name: announcements
    description: Team announcements
  - name: documents
    description: Documents and wiki

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProject"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProject"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all team members
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMember"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMember"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks with optional filters
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: assigneeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: priority
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTask"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTask"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/reorder:
    post:
      operationId: reorderTasks
      tags: [tasks]
      summary: Reorder tasks (for kanban drag-and-drop)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTasks"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /sprints:
    get:
      operationId: listSprints
      tags: [sprints]
      summary: List sprints
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Sprints list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sprint"
    post:
      operationId: createSprint
      tags: [sprints]
      summary: Create a sprint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSprint"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sprint"

  /sprints/{id}:
    patch:
      operationId: updateSprint
      tags: [sprints]
      summary: Update a sprint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSprint"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sprint"

  /time-entries:
    get:
      operationId: listTimeEntries
      tags: [timeEntries]
      summary: List time entries
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: memberId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Time entries list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"
    post:
      operationId: createTimeEntry
      tags: [timeEntries]
      summary: Create a time entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeEntry"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /time-entries/{id}:
    patch:
      operationId: updateTimeEntry
      tags: [timeEntries]
      summary: Update a time entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimeEntry"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"
    delete:
      operationId: deleteTimeEntry
      tags: [timeEntries]
      summary: Delete a time entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals with key results
      responses:
        "200":
          description: Goals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoal"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGoal"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncement"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncement"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}/react:
    post:
      operationId: reactToAnnouncement
      tags: [announcements]
      summary: Add a reaction to an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emoji:
                  type: string
              required:
                - emoji
      responses:
        "200":
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}/comments:
    post:
      operationId: commentOnAnnouncement
      tags: [announcements]
      summary: Add a comment to an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                authorId:
                  type: integer
              required:
                - text
                - authorId
      responses:
        "200":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: projectId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocument"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocument"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [projects]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [projects]
      summary: AI chat endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                context:
                  type: string
              required:
                - message
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                required:
                  - reply

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        client:
          type: string
        budget:
          type: number
        health:
          type: integer
        phase:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - icon
        - color
        - client
        - budget
        - health
        - phase
        - createdAt

    CreateProject:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        client:
          type: string
        budget:
          type: number
        health:
          type: integer
        phase:
          type: string
      required:
        - name
        - icon
        - color
        - client
        - budget

    UpdateProject:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        client:
          type: string
        budget:
          type: number
        health:
          type: integer
        phase:
          type: string

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        initials:
          type: string
        color:
          type: string
        role:
          type: string
        rate:
          type: number
        capacity:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - initials
        - color
        - role
        - rate
        - capacity
        - createdAt

    CreateMember:
      type: object
      properties:
        name:
          type: string
        initials:
          type: string
        color:
          type: string
        role:
          type: string
        rate:
          type: number
        capacity:
          type: integer
      required:
        - name
        - initials
        - color
        - role
        - rate
        - capacity

    UpdateMember:
      type: object
      properties:
        name:
          type: string
        initials:
          type: string
        color:
          type: string
        role:
          type: string
        rate:
          type: number
        capacity:
          type: integer

    Subtask:
      type: object
      properties:
        title:
          type: string
        done:
          type: boolean
      required:
        - title
        - done

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [task, bug, feature, story, epic]
        status:
          type: string
          enum: [backlog, todo, inprogress, review, done, blocked]
        priority:
          type: string
          enum: [critical, high, medium, low]
        projectId:
          type: integer
        sprintId:
          type: ["integer", "null"]
        assigneeIds:
          type: array
          items:
            type: integer
        points:
          type: integer
        due:
          type: ["string", "null"]
          format: date-time
        tags:
          type: array
          items:
            type: string
        subtasks:
          type: array
          items:
            $ref: "#/components/schemas/Subtask"
        notes:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - status
        - priority
        - projectId
        - assigneeIds
        - points
        - tags
        - subtasks
        - notes
        - sortOrder
        - createdAt

    CreateTask:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [task, bug, feature, story, epic]
        status:
          type: string
          enum: [backlog, todo, inprogress, review, done, blocked]
        priority:
          type: string
          enum: [critical, high, medium, low]
        projectId:
          type: integer
        sprintId:
          type: ["integer", "null"]
        assigneeIds:
          type: array
          items:
            type: integer
        points:
          type: integer
        due:
          type: ["string", "null"]
          format: date-time
        tags:
          type: array
          items:
            type: string
        subtasks:
          type: array
          items:
            $ref: "#/components/schemas/Subtask"
        notes:
          type: string
      required:
        - title
        - type
        - status
        - priority
        - projectId

    UpdateTask:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [task, bug, feature, story, epic]
        status:
          type: string
          enum: [backlog, todo, inprogress, review, done, blocked]
        priority:
          type: string
          enum: [critical, high, medium, low]
        projectId:
          type: integer
        sprintId:
          type: ["integer", "null"]
        assigneeIds:
          type: array
          items:
            type: integer
        points:
          type: integer
        due:
          type: ["string", "null"]
          format: date-time
        tags:
          type: array
          items:
            type: string
        subtasks:
          type: array
          items:
            $ref: "#/components/schemas/Subtask"
        notes:
          type: string
        sortOrder:
          type: integer

    ReorderTasks:
      type: object
      properties:
        taskIds:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [backlog, todo, inprogress, review, done, blocked]
      required:
        - taskIds
        - status

    Sprint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        projectId:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        goal:
          type: string
        status:
          type: string
          enum: [planned, active, completed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - projectId
        - startDate
        - endDate
        - goal
        - status
        - createdAt

    CreateSprint:
      type: object
      properties:
        name:
          type: string
        projectId:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        goal:
          type: string
        status:
          type: string
          enum: [planned, active, completed]
      required:
        - name
        - projectId
        - startDate
        - endDate
        - goal

    UpdateSprint:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        goal:
          type: string
        status:
          type: string
          enum: [planned, active, completed]

    TimeEntry:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        projectId:
          type: integer
        description:
          type: string
        hours:
          type: number
        date:
          type: string
          format: date-time
        billable:
          type: boolean
        rate:
          type: number
        amount:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - memberId
        - projectId
        - description
        - hours
        - date
        - billable
        - rate
        - amount
        - createdAt

    CreateTimeEntry:
      type: object
      properties:
        memberId:
          type: integer
        projectId:
          type: integer
        description:
          type: string
        hours:
          type: number
        date:
          type: string
          format: date-time
        billable:
          type: boolean
        rate:
          type: number
      required:
        - memberId
        - projectId
        - description
        - hours
        - date
        - billable
        - rate

    UpdateTimeEntry:
      type: object
      properties:
        description:
          type: string
        hours:
          type: number
        billable:
          type: boolean

    KeyResult:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        progress:
          type: integer
        target:
          type: number
        current:
          type: number
        unit:
          type: string
      required:
        - id
        - title
        - progress
        - target
        - current
        - unit

    Goal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [on_track, at_risk, off_track]
        progress:
          type: integer
        due:
          type: string
          format: date-time
        ownerId:
          type: integer
        projectId:
          type: ["integer", "null"]
        keyResults:
          type: array
          items:
            $ref: "#/components/schemas/KeyResult"
        createdAt:
          type: string
